<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceder - Abasto Ya</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        :root {
            --primary-color: #2C5F2D; /* Verde oscuro */
            --secondary-color: #97BC62; /* Verde claro */
            --accent-color: #F9A03F; /* Naranja/amarillo */
            --background-color: #F4F1DE; /* Beige claro */
            --text-color: #3E2723; /* Marrón oscuro */
            --error-color: #D32F2F; /* Rojo para errores */
        }

        body {
            margin: 0;
            padding: 2rem 1rem;
            font-family: 'Poppins', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background-color: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-sizing: border-box;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(44, 95, 45, 0.3);
        }

        .btn-primary:hover {
            background-color: #1A4314;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(44, 95, 45, 0.4);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .btn-secondary:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none; /* Oculto por defecto */
        }

    </style>
</head>
<body>

    <div class="form-container">
        <h1>Acceder</h1>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Nombre de Usuario o Correo</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <div class="button-group">
                <button type="submit" class="btn btn-primary">Entrar</button>
                <a href="index.html" class="btn btn-secondary">Volver al inicio</a>
            </div>
        </form>
    </div>

    <script>
        const API_URL = 'http://192.168.100.2:3001/usuarios';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            const dataToSend = { username, password };

            fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataToSend)
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => { throw new Error(err.message || 'Error de autenticación') });
                }
                return response.json();
            })
            .then(data => {
                if (data.token) {
                    localStorage.setItem('token', data.token);

                    // Decodificar el token para obtener el tipo de usuario
                    try {
                        const payloadBase64 = data.token.split('.')[1];
                        const decodedPayload = JSON.parse(atob(payloadBase64));
                        const userType = decodedPayload.tipo;
                        
                        // Guardar el usuario para usar su nombre en el dashboard
                        localStorage.setItem('usuario', JSON.stringify(decodedPayload));

                        if (userType === 'ADMIN') {
                            window.location.href = 'dashboard-admin.html';
                        } else if (userType === 'PROVEEDOR') {
                            window.location.href = 'dashboard-proveedor.html';
                        } else if (userType === 'CLIENTE') {
                            window.location.href = 'dashboard-cliente.html';
                        }
                        else {
                            window.location.href = 'dashboard.html';
                        }
                    } catch (e) {
                        console.error('Error al decodificar el token:', e);
                        throw new Error('El token recibido no es válido.');
                    }
                } else {
                    throw new Error(data.message || 'No se recibió el token.');
                }
            })
            .catch(error => {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
                console.error('Error en el login:', error);
            });
        });
    </script>

</body>
</html>

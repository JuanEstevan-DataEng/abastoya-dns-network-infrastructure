<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Abasto Ya</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        :root {
            --primary-color: #2C5F2D; /* Verde oscuro */
            --secondary-color: #97BC62; /* Verde claro */
            --accent-color: #F9A03F; /* Naranja/amarillo */
            --background-color: #F4F1DE; /* Beige claro */
            --text-color: #3E2723; /* Marrón oscuro */
            --error-color: #D32F2F; /* Rojo para errores */
            --success-color: #388E3C; /* Verde para éxito */
        }

        body {
            margin: 0;
            padding: 2rem 1rem;
            font-family: 'Poppins', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to right top, #d4e6c3, #ddeac7, #e6eecb, #eef2d1, #f6f6d7);
        }

        .form-container {
            background-color: white;
            padding: 2.5rem 3rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 650px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group.inline {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .form-group.nit-group {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input, select {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s;
            background-color: #f9f9f9;
        }

        #nombreEmpresa { text-transform: uppercase; }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(44, 95, 45, 0.2);
            background-color: #fff;
        }

        .validation-message {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none; /* Oculto por defecto */
        }

        .error-message {
            color: var(--error-color);
        }

        .success-message {
            color: var(--success-color);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2.5rem;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(44, 95, 45, 0.3);
        }

        .btn-primary:hover {
            background-color: #1A4314;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(44, 95, 45, 0.4);
        }
        
        .btn-secondary {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .btn-secondary:hover {
            background-color: var(--primary-color);
            color: white;
        }
        
        .hidden {
            display: none;
        }

        #password-requirements {
            list-style: none;
            padding: 0;
            margin-top: 0.5rem;
        }

        #password-requirements li {
            font-size: 0.8rem;
            color: var(--error-color);
            transition: color 0.3s;
            padding-left: 1.2em;
            position: relative;
        }
        
        #password-requirements li::before {
            content: '✕';
            position: absolute;
            left: 0;
            color: var(--error-color);
            transition: all 0.3s;
        }

        #password-requirements li.valid {
            color: var(--success-color);
            text-decoration: line-through;
        }

        #password-requirements li.valid::before {
            content: '✓';
            color: var(--success-color);
        }

    </style>
</head>
<body>

    <div class="form-container">
        <h1>Crear una cuenta</h1>

        <form id="registroForm">
            <div class="form-group">
                <label for="tipoUsuario">Registrarse como</label>
                <select id="tipoUsuario" name="tipoUsuario">
                    <option value="CLIENTE">Cliente</option>
                    <option value="PROVEEDOR">Proveedor</option>
                </select>
            </div>

            <!-- CAMPOS COMUNES (Username, Email, Password, etc.) -->
            <div id="camposComunes">
                <div class="form-group">
                    <label for="username">Nombre de Usuario</label>
                    <input type="text" id="username" name="username" required>
                    <div id="usernameValidation" class="validation-message"></div>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required>
                    <div id="emailValidation" class="validation-message"></div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                    <ul id="password-requirements">
                        <li id="length">Entre 12 y 16 caracteres</li>
                        <li id="number">Al menos un número</li>
                        <li id="symbol">Al menos un símbolo</li>
                    </ul>
                </div>

                 <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" name="telefono" pattern="[0-9]+" title="Solo se admiten números.">
                </div>
                
                <div class="form-group">
                    <label>Dirección</label>
                    <div class="form-group inline">
                        <select id="tipoVia" name="tipoVia">
                            <option value="Calle">Calle</option>
                            <option value="Carrera">Carrera</option>
                            <option value="Avenida">Avenida</option>
                            <option value="Diagonal">Diagonal</option>
                            <option value="Transversal">Transversal</option>
                        </select>
                        <input type="text" id="numeroVia" placeholder="Ej: 24A">
                    </div>
                    <div class="form-group inline">
                        <input type="text" id="numeroCruce" placeholder="# 70">
                        <input type="text" id="numeroPuerta" placeholder="- 15">
                    </div>
                </div>
            </div>

            <!-- CAMPOS ESPECÍFICOS -->
            <div id="camposEspecificos">
                <!-- Cliente -->
                <div id="formCliente">
                    <div class="form-group inline">
                        <div>
                            <label for="primerNombre">Primer Nombre</label>
                            <input type="text" id="primerNombre" name="primerNombre" required>
                        </div>
                        <div>
                            <label for="segundoNombre">Segundo Nombre</label>
                            <input type="text" id="segundoNombre" name="segundoNombre">
                        </div>
                    </div>
                    <div class="form-group inline">
                        <div>
                            <label for="primerApellido">Primer Apellido</label>
                            <input type="text" id="primerApellido" name="primerApellido" required>
                        </div>
                        <div>
                            <label for="segundoApellido">Segundo Apellido</label>
                            <input type="text" id="segundoApellido" name="segundoApellido">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="cedula">Número de Identificación</label>
                        <input type="text" id="cedula" name="cedula" pattern="[0-9]+" title="Solo se admiten números.">
                    </div>
                     <div class="form-group">
                        <label for="nombreTienda">Nombre de la Tienda (Opcional)</label>
                        <input type="text" id="nombreTienda" placeholder="Ej: Supermercado El Vecino">
                    </div>
                </div>

                <!-- Proveedor -->
                <div id="formProveedor" class="hidden">
                    <div class="form-group">
                        <label for="nombreEmpresa">Nombre de la Empresa</label>
                        <input type="text" id="nombreEmpresa" name="nombreEmpresa">
                    </div>
                    <div class="form-group">
                        <label for="nit">NIT</label>
                        <div class="nit-group">
                            <input type="text" id="nit" name="nit" pattern="[0-9]{8,10}" title="De 8 a 10 dígitos numéricos.">
                            <select id="nitDv" name="nitDv">
                                <option value="0">- 0</option>
                                <option value="1">- 1</option>
                                <option value="2">- 2</option>
                                <option value="3">- 3</option>
                                <option value="4">- 4</option>
                                <option value="5">- 5</option>
                                <option value="6">- 6</option>
                                <option value="7">- 7</option>
                                <option value="8">- 8</option>
                                <option value="9">- 9</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-primary">Registrarse</button>
                <a href="index.html" class="btn btn-secondary">Volver</a>
            </div>
        </form>
    </div>

    <script>
        const API_URL = 'http://192.168.100.2:3001/usuarios'; // URL del microservicio de usuarios

        // --- DOM Elements ---
        const tipoUsuarioSelect = document.getElementById('tipoUsuario');
        const formCliente = document.getElementById('formCliente');
        const formProveedor = document.getElementById('formProveedor');
        const usernameInput = document.getElementById('username');
        const usernameValidation = document.getElementById('usernameValidation');
        const emailInput = document.getElementById('email');
        const emailValidation = document.getElementById('emailValidation');
        const passwordInput = document.getElementById('password');
        const lengthReq = document.getElementById('length');
        const numberReq = document.getElementById('number');
        const symbolReq = document.getElementById('symbol');

        // --- Toggle Forms & Required Fields ---
        const toggleFormFields = () => {
            const isCliente = tipoUsuarioSelect.value === 'CLIENTE';

            // Toggle visibility
            formCliente.classList.toggle('hidden', !isCliente);
            formProveedor.classList.toggle('hidden', isCliente);

            // Toggle required attributes for Cliente
            document.getElementById('primerNombre').required = isCliente;
            document.getElementById('primerApellido').required = isCliente;
            document.getElementById('cedula').required = isCliente;

            // Toggle required attributes for Proveedor
            document.getElementById('nombreEmpresa').required = !isCliente;
            document.getElementById('nit').required = !isCliente;
        };

        tipoUsuarioSelect.addEventListener('change', toggleFormFields);

        // Set initial state on page load for required fields
        toggleFormFields();

        // --- Real-time Validation ---
        const debounce = (func, delay) => {
            let timeout;
            return (...args) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), delay);
            };
        };

        const checkExistence = async (field, value, validationElement, message) => {
            try {
                const response = await fetch(`${API_URL}/check-${field}/${value}`);
                const data = await response.json();
                validationElement.style.display = 'block';
                if (data.existe) {
                    validationElement.textContent = `Este ${message} ya está en uso.`;
                    validationElement.className = 'validation-message error-message';
                } else {
                    validationElement.textContent = `${message.charAt(0).toUpperCase() + message.slice(1)} disponible.`;
                    validationElement.className = 'validation-message success-message';
                }
            } catch (error) {
                validationElement.style.display = 'none';
            }
        };

        usernameInput.addEventListener('input', debounce(() => {
            if (usernameInput.value.length >= 3) {
                checkExistence('username', usernameInput.value, usernameValidation, 'nombre de usuario');
            }
        }, 500));

        emailInput.addEventListener('input', debounce(() => {
            if (emailInput.value.includes('@') && emailInput.value.includes('.')) {
                checkExistence('email', emailInput.value, emailValidation, 'correo electrónico');
            }
        }, 500));

        passwordInput.addEventListener('input', () => {
            const pass = passwordInput.value;
            lengthReq.classList.toggle('valid', pass.length >= 12 && pass.length <= 16);
            numberReq.classList.toggle('valid', /[0-9]/.test(pass));
            symbolReq.classList.toggle('valid', /[^A-Za-z0-9]/.test(pass));
        });

        // --- Input Sanitization ---
        document.querySelectorAll('input[pattern="[0-9]+"]').forEach(input => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
            });
        });

        // --- Form Submission ---
        document.getElementById('registroForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const tipoUsuario = tipoUsuarioSelect.value;
            
            // --- Datos Comunes ---
            const direccionCompleta = `
                ${document.getElementById('tipoVia').value} 
                ${document.getElementById('numeroVia').value} # 
                ${document.getElementById('numeroCruce').value} - 
                ${document.getElementById('numeroPuerta').value}
            `.trim().replace(/\s+/g, ' ');

            let dataToSend = {
                tipo: tipoUsuario,
                username: document.getElementById('username').value,
                telefono: document.getElementById('telefono').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            // --- Datos Específicos ---
            if (tipoUsuario === 'CLIENTE') {
                const nombreCompleto = [
                    document.getElementById('primerNombre').value.trim(),
                    document.getElementById('segundoNombre').value.trim(),
                    document.getElementById('primerApellido').value.trim(),
                    document.getElementById('segundoApellido').value.trim()
                ].filter(Boolean).join(' ');

                const tienda = document.getElementById('nombreTienda').value.trim();

                dataToSend.nombre = nombreCompleto;
                dataToSend.cedula_NIT = document.getElementById('cedula').value;
                dataToSend.direccion = tienda ? `${direccionCompleta} | ${tienda}` : direccionCompleta;

            } else { // PROVEEDOR
                dataToSend.nombre = document.getElementById('nombreEmpresa').value.toUpperCase();
                const nit = document.getElementById('nit').value;
                const nitDv = document.getElementById('nitDv').value;
                dataToSend.cedula_NIT = `${nit}-${nitDv}`;
                dataToSend.direccion = direccionCompleta;
            }

            console.log('Enviando al backend:', dataToSend);

            // --- Fetch to Backend (descomentar para activar) ---
            fetch(`${API_URL}/registro`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataToSend)
            })
            .then(response => response.json())
            .then(data => {
                if (data.usuarioId) {
                    alert(`Se envio una solicitud de registro en abasto ya como ${tipoUsuario}! Te avisaremos via correo electronico / sms tu activacion`);
                    window.location.href = 'index.html';
                } else {
                    alert('Error en el registro: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error en el registro:', error);
                alert('Ocurrió un error de conexión. Inténtalo de nuevo.');
            });
        });

    </script>

</body>
</html>

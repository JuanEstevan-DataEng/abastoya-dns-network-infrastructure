<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Ventas - Abasto Ya</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        :root {
            --primary-color: #2C5F2D;
            --secondary-color: #97BC62;
            --background-color: #F4F1DE;
            --text-color: #3E2723;
            --white-color: #FFFFFF;
            --error-color: #D32F2F;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .header {
            background-color: var(--primary-color);
            color: var(--white-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header h1 { margin: 0; font-size: 1.8rem; }
        .header a { color: var(--white-color); text-decoration: none; font-weight: 600; }

        .main-container { padding: 2rem; }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 0.5rem;
        }

        .table-container {
            background-color: var(--white-color);
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem 1.2rem; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f7f7f7; font-weight: 700; color: var(--primary-color); }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f1f1f1; }

        .actions-btn {
            background-color: var(--secondary-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.3s;
            border: none;
            cursor: pointer;
        }
        .actions-btn:hover { background-color: #7BA04F; }

        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0;
            width: 100%; height: 100%; 
            overflow: auto; 
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 2rem 2.5rem;
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 { margin: 0; color: var(--primary-color); }

        .close-button {
            color: #aaa;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .close-button:hover, .close-button:focus { color: black; }
        
        .toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 2rem;
        }

        .toolbar select {
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            width: 250px;
        }

    </style>
</head>
<body>

    <header class="header">
        <h1>Mis Ventas</h1>
        <a href="dashboard-proveedor.html">Volver al Panel</a>
    </header>

    <main class="main-container">
        <h2 class="section-title">Historial de Órdenes de Pago</h2>
        
        <div class="toolbar">
            <select id="status-filter">
                <option value="">Filtrar por estado...</option>
                <option value="PENDIENTE">Pendiente</option>
                <option value="PAGADO">Pagado</option>
                <option value="CANCELADO">Cancelado</option>
            </select>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID Orden</th>
                        <th># Radicado Contrato</th>
                        <th>Cliente</th>
                        <th>Monto Total</th>
                        <th>Saldo Pendiente</th>
                        <th>Estado</th>
                        <th>Fecha de Creación</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="payment-orders-table-body">
                    <!-- Las filas se insertarán aquí -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal para Historial de Pagos -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Historial de Transacciones</h2>
                <span class="close-button">&times;</span>
            </div>
            <div id="modal-body" class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID Transacción</th>
                            <th>Monto Pagado</th>
                            <th>Fecha de Pago</th>
                            <th>Método</th>
                            <th>Referencia de Pago</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body">
                        <!-- Historial de pagos aquí -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const PAGOS_API_URL = 'http://192.168.100.2:3004/pagos';
        const USERS_API_URL = 'http://192.168.100.2:3001/usuarios';

        // --- DOM Elements ---
        const tableBody = document.getElementById('payment-orders-table-body');
        const modal = document.getElementById('history-modal');
        const closeModalBtn = modal.querySelector('.close-button');
        const historyTableBody = document.getElementById('history-table-body');
        const modalTitle = document.getElementById('modal-title');
        const statusFilter = document.getElementById('status-filter');

        let allPaymentOrders = [];

        // --- Helper Functions ---
        const formatCurrency = (value) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(value);
        const formatDate = (dateString) => new Date(dateString).toLocaleDateString('es-CO', { year: 'numeric', month: 'long', day: 'numeric' });
        const formatUnderscores = (text) => text ? text.replace(/_/g, ' ') : 'N/A';

        const authenticatedFetch = async (url, options = {}) => {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = 'login.html'; return; }
            const headers = { 'Content-Type': 'application/json', ...options.headers, 'Authorization': `Bearer ${token}` };
            const response = await fetch(url, { ...options, headers });
            if (!response.ok) {
                if (response.status === 401 || response.status === 403) {
                    alert('Su sesión ha expirado o no tiene permisos.');
                    window.location.href = 'login.html';
                }
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.message || `Error ${response.status}`);
            }
            return response.json();
        };

        const renderTable = (paymentOrders) => {
            tableBody.innerHTML = '';
            if (paymentOrders.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;">No se encontraron órdenes de pago con los filtros seleccionados.</td></tr>';
                return;
            }

            paymentOrders.forEach(order => {
                const row = `
                    <tr>
                        <td>${order.id}</td>
                        <td>${order.contrato_id}</td>
                        <td>${order.cliente_nombre || 'N/A'}</td>
                        <td>${formatCurrency(order.monto_total)}</td>
                        <td>${formatCurrency(order.saldo_pendiente)}</td>
                        <td>${formatUnderscores(order.estado)}</td>
                        <td>${formatDate(order.fecha_de_creacion)}</td>
                        <td>
                            <button class="actions-btn" data-order-id="${order.id}" data-action="history">Ver Historial</button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        };

        const applyFilters = () => {
            const selectedStatus = statusFilter.value;
            let filteredOrders = allPaymentOrders;
            if (selectedStatus) {
                filteredOrders = filteredOrders.filter(o => o.estado === selectedStatus);
            }
            renderTable(filteredOrders);
        };

        const openHistoryModal = async (orderId) => {
            modalTitle.textContent = `Historial de Transacciones - Orden #${orderId}`;
            historyTableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Cargando historial...</td></tr>';
            modal.style.display = 'flex';

            try {
                const orderDetails = await authenticatedFetch(`${PAGOS_API_URL}/transaccionesPorOrden/${orderId}`);
                const transactions = orderDetails.transacciones || [];
                historyTableBody.innerHTML = '';
                if (transactions.length === 0) {
                    historyTableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No hay transacciones para esta orden.</td></tr>';
                    return;
                }
                transactions.forEach(tx => {
                    const row = `
                        <tr>
                            <td>${tx.id}</td>
                            <td>${formatCurrency(tx.monto)}</td>
                            <td>${formatDate(tx.fecha_transaccion)}</td>
                            <td>${formatUnderscores(tx.metodo_pago)}</td>
                            <td>${tx.id_referencia_externa || 'N/A'}</td>
                        </tr>
                    `;
                    historyTableBody.innerHTML += row;
                });
            } catch (error) {
                console.error('Error fetching payment history:', error);
                historyTableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--error-color);">Error al cargar el historial.</td></tr>';
            }
        };
        
        // --- Event Listeners ---
        tableBody.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON' && e.target.dataset.action === 'history') {
                const orderId = e.target.dataset.orderId;
                openHistoryModal(orderId);
            }
        });

        closeModalBtn.addEventListener('click', () => modal.style.display = 'none');
        window.addEventListener('click', (e) => {
            if (e.target == modal) modal.style.display = 'none';
        });

        statusFilter.addEventListener('change', applyFilters);

        // --- Initial Load ---
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const paymentOrders = await authenticatedFetch(`${PAGOS_API_URL}/mostrarOrdenes`);

                // Enrich with client names
                const clientIds = [...new Set(paymentOrders.map(order => order.cliente_id))];
                const users = await Promise.all(
                    clientIds.map(id => authenticatedFetch(`${USERS_API_URL}/buscarUsuario/${id}`))
                );
                const userMap = new Map(users.map(user => [user.id, user.nombre]));

                allPaymentOrders = paymentOrders.map(order => ({
                    ...order,
                    cliente_nombre: userMap.get(order.cliente_id)
                }));

                renderTable(allPaymentOrders);
            } catch (error) {
                console.error('Error loading initial data:', error);
                tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:var(--error-color);">Error al cargar los datos.</td></tr>`;
            }
        });

    </script>

</body>
</html>
